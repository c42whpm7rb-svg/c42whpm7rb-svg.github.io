<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailing Videos - HD Customs</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1>HD Customs</h1>
            </div>
            <div class="nav-toggle" id="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="services.html" class="nav-link">Services</a></li>
                <li><a href="videos.html" class="nav-link">Videos</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Professional Detailing Videos</h1>
            <p class="tagline">See our detailing process and final results</p>
        </div>
    </section>

    <section class="videos-section">
        <div class="container">
            <h2>Detailing Videos</h2>
            <div class="video-grid">
                <div class="video-card">
                    <h3>Full Detailing Process</h3>
                    <video controls playsinline preload="metadata">
                        <source src="videos/detailing.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <p>Watch our complete interior and exterior detailing workflow.</p>
                </div>
            </div>

            <p style="text-align:center;margin-top:30px;"><a href="services.html" class="cta-button">Back to Services</a></p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 HD Customs. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const navToggle = document.getElementById('nav-toggle');
        const navMenu = document.getElementById('nav-menu');

        if (navToggle) {
            navToggle.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                navToggle.classList.toggle('active');
            });
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                navToggle.classList.remove('active');
            });
        });
    </script>
</body>
</html>
